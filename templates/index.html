<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>棒球即時比分</title>

<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="棒球比分">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3306/3306612.png">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('PWA Service Worker 註冊成功！', reg))
        .catch(err => console.log('PWA 註冊失敗：', err));
    });
  }
</script>

<style>
:root {
  --bg:#0a0f1e;--bg2:#111827;--card:#161d2e;--card2:#1c2539;--border:#1f2d45;
  --text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--gold:#f59e0b;--live:#f43f5e;--final:#10b981;
  --ball:#22c55e;--strike:#facc15;--out:#ef4444;--runner:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,\"Noto Sans TC\",sans-serif;min-height:100vh}
.header{background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 100%);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.brand{display:flex;align-items:center;gap:12px}
.logo{font-size:28px;animation:spin 4s linear infinite;display:inline-block}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.title h1{font-size:20px;font-weight:700;letter-spacing:1px;background:linear-gradient(to right,#fff,var(--muted));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.title p{font-size:12px;color:var(--muted);margin-top:2px}
.controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.nav-tabs{display:flex;background:var(--bg);padding:4px;border-radius:8px;border:1px solid var(--border)}
.nav-btn{background:none;border:none;color:var(--muted);padding:8px 16px;font-size:14px;font-weight:500;border-radius:6px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.nav-btn.active{background:var(--card);color:var(--accent);box-shadow:0 2px 4px rgba(0,0,0,.2)}
.date-picker{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px 12px;color:var(--text)}
.date-picker input{background:none;border:none;color:var(--text);font-size:14px;font-family:inherit;outline:none;cursor:pointer}
.date-picker input::-webkit-calendar-picker-indicator{filter:invert(1)}
.container{max-width:1200px;margin:0 auto;padding:24px 16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 4px 6px -1px rgba(0,0,0,.1);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-2px);box-shadow:0 10px 15px -3px rgba(0,0,0,.3);border-color:var(--accent)}
.card-header{background:var(--card2);padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--muted)}
.venue{display:flex;align-items:center;gap:4px;max-width:60%}
.venue-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status-badge{padding:4px 8px;border-radius:20px;font-weight:600;font-size:11px;letter-spacing:.5px;display:flex;align-items:center;gap:4px}
.status-badge.live{background:rgba(244,63,94,.1);color:var(--live);animation:pulse 2s infinite}
.status-badge.final{background:rgba(16,185,129,.1);color:var(--final)}
.status-badge.preview{background:rgba(148,163,184,.1);color:var(--muted)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.scoreboard{padding:16px;flex:1;display:flex;flex-direction:column;justify-content:center}
.score-table{width:100%;border-collapse:collapse;margin:8px 0}
.score-table th,.score-table td{text-align:center;padding:6px 4px;font-size:14px}
.score-table th{color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.score-table td.team-name{text-align:left;font-weight:600;padding-left:4px;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score-table td.total{font-weight:700;color:var(--accent);font-size:15px;background:rgba(56,189,248,.03);width:32px}
.score-table td.stat{color:var(--muted);width:24px;font-size:12px}
.score-table td.inn-score{width:22px;font-size:13px}
.score-table tr.active-team td.team-name{color:var(--accent)}
.live-box{border-top:1px dashed var(--border);background:var(--card2);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.count-indicators{display:flex;flex-direction:column;gap:6px}
.count-row{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--muted);width:70px}
.dots{display:flex;gap:4px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.dot.b.active{background:var(--ball);box-shadow:0 0 6px var(--ball)}
.dot.s.active{background:var(--strike);box-shadow:0 0 6px var(--strike)}
.dot.o.active{background:var(--out);box-shadow:0 0 6px var(--out)}
.diamond-wrapper{width:54px;height:54px;position:relative;display:flex;align-items:center;justify-content:center}
.diamond{width:34px;height:34px;border:2px solid var(--border);transform:rotate(45deg);position:relative}
.base{width:10px;height:10px;background:var(--card2);border:1.5px solid var(--border);position:absolute;transition:all .2s;transform:rotate(-45deg)}
.base.active{background:var(--runner);border-color:var(--runner);box-shadow:0 0 8px var(--runner)}
.base.b1{top:-6px;right:-6px}
.base.b2{top:-6px;left:-6px}
.base.b3{bottom:-6px;left:-6px}
.pbp{border-top:1px solid var(--border);background:rgba(15,23,42,.4);padding:10px 16px;font-size:12px;color:var(--muted);line-height:1.5;max-height:68px;overflow-y:auto;font-family:inherit}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.3}
@media(max-width:640px){
  .header{flex-direction:column;gap:16px;align-items:stretch;padding:12px 16px}
  .controls{justify-content:space-between;width:100%}
  .nav-tabs,.date-picker{flex:1;justify-content:center}
  .nav-btn{flex:1;justify-content:center;padding:8px 8px;font-size:13px}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <span class="logo">⚾</span>
    <div class="title">
      <h1>棒球即時比分 Live</h1>
      <p>MLB • NPB • KBO 賽事追蹤</p>
    </div>
  </div>
  <div class="controls">
    <div class="nav-tabs">
      <button class="nav-btn active" onclick="switchLeague('MLB')">MLB</button>
      <button class="nav-btn" onclick="switchLeague('NPB')">日職</button>
      <button class="nav-btn" onclick="switchLeague('KBO')">韓職</button>
    </div>
    <div class="date-picker">
      📅 <input type="date" id="dateInput" onchange="switchDate(this.value)">
    </div>
  </div>
</div>

<div class="container">
  <div class="grid" id="grid"></div>
</div>

<script>
let league = 'MLB';
let date = new Date();

function ymdLocal(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const r = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${r}`;
}

document.getElementById('dateInput').value = ymdLocal(date);

function switchLeague(lg) {
  league = lg;
  document.querySelectorAll('.nav-btn').forEach((b, idx) => {
    b.classList.toggle('active', (idx === 0 && lg === 'MLB') || (idx === 1 && lg === 'NPB') || (idx === 2 && lg === 'KBO'));
  });
  load();
}

function switchDate(val) {
  if(!val) return;
  date = new Date(val);
  load();
}

function renderGame(g) {
  let badgeClass = 'preview';
  if (g.Status === '比賽中') badgeClass = 'live';
  if (g.Status === '已結束') badgeClass = 'final';

  let timeHtml = g.GameTime ? g.GameTime.split(' ')[1] || g.GameTime : '';
  if (g.Status === '比賽中') {
    timeHtml = `${g.IsTopInning ? '上' : '下'}${g.CurrentInning}局`;
  } else if (g.Status === '已結束') {
    timeHtml = 'Final';
  }

  const innLen = Math.max(9, g.Innings ? g.Innings.length : 0);
  let ths = '';
  let awayInn = '';
  let homeInn = '';

  for (let i = 1; i <= innLen; i++) {
    ths += `<th>${i}</th>`;
    const node = g.Innings ? g.Innings.find(item => item.num === i) : null;
    if (g.Status === '未開賽') {
      awayInn += `<td class="inn-score">-</td>`;
      homeInn += `<td class="inn-score">-</td>`;
    } else {
      awayInn += `<td class="inn-score">${node && node.away !== null ? node.away : (g.Innings && g.Innings.length >= i ? '0' : '-')}</td>`;
      homeInn += `<td class="inn-score">${node && node.home !== null ? node.home : (g.Innings && g.Innings.length >= i ? '0' : '-')}</td>`;
    }
  }

  let liveHtml = '';
  if (g.Status === '比賽中') {
    const b1 = g.RunnerOnFirst ? 'active' : '';
    const b2 = g.RunnerOnSecond ? 'active' : '';
    const b3 = g.RunnerOnThird ? 'active' : '';
    
    let bDots = '', sDots = '', oDots = '';
    for(let i=1; i<=3; i++) {
      if(i<=3) bDots += `<span class="dot b ${g.Balls >= i ? 'active' : ''}"></span>`;
      if(i<=2) sDots += `<span class="dot s ${g.Strikes >= i ? 'active' : ''}"></span>`;
      if(i<=2) oDots += `<span class="dot o ${g.Outs >= i ? 'active' : ''}"></span>`;
    }

    liveHtml = `
    <div class="live-box">
      <div class="count-indicators">
        <div class="count-row">B ${bDots}</div>
        <div class="count-row">S ${sDots}</div>
        <div class="count-row">O ${oDots}</div>
      </div>
      <div class="diamond-wrapper">
        <div class="diamond">
          <span class="base b1 ${b1}"></span>
          <span class="base b2 ${b2}"></span>
          <span class="base b3 ${b3}"></span>
        </div>
      </div>
    </div>`;
  }

  const isAwayActive = g.Status === '比賽中' && g.IsTopInning;
  const isHomeActive = g.Status === '比賽中' && !g.IsTopInning;

  return `
  <div class="card">
    <div class="card-header">
      <div class="venue" title="${g.Venue || '未公佈'}">📍 <span class="venue-text">${g.Venue || '未公佈'}</span></div>
      <div class="status-badge ${badgeClass}">
        ${g.Status === '比賽中' ? '● ' : ''}${timeHtml}
      </div>
    </div>
    <div class="scoreboard">
      <table class="score-table">
        <thead>
          <tr>
            <th style="text-align:left;padding-left:4px">球隊</th>
            ${ths}
            <th>R</th><th>H</th><th>E</th>
          </tr>
        </thead>
        <tbody>
          <tr class="${isAwayActive ? 'active-team' : ''}">
            <td class="team-name">${g.AwayTeam}</td>
            ${awayInn}
            <td class="total">${g.AwayTeamRuns}</td>
            <td class="stat">${g.AwayTeamHits}</td>
            <td class="stat">${g.AwayTeamErrors}</td>
          </tr>
          <tr class="${isHomeActive ? 'active-team' : ''}">
            <td class="team-name">${g.HomeTeam}</td>
            ${homeInn}
            <td class="total">${g.HomeTeamRuns}</td>
            <td class="stat">${g.HomeTeamHits}</td>
            <td class="stat">${g.HomeTeamErrors}</td>
          </tr>
        </tbody>
      </table>
    </div>
    ${liveHtml}
    <div class="pbp" id="pbp-${g.GameID}">讀取賽事資訊中</div>
  </div>`;
}

async function load() {
  const grid = document.getElementById('grid');
  grid.innerHTML = `<div class=\"empty\"><div class=\"empty-icon\">⚾</div><p>資料載入中</p></div>`;
  try {
    const ymd = ymdLocal(date);
    const res = await fetch(`/api/games?league=${league}&date=${ymd}`);
    const data = await res.json();
    const games = data.games || [];
    document.getElementById('dateInput').value = data.date || ymd;

    if (!games.length) {
      grid.innerHTML = `<div class=\"empty\"><div class=\"empty-icon\">—</div><p>${league} 這天沒有賽事資料</p></div>`;
      return;
    }

    grid.innerHTML = games.map(renderGame).join('');
    games.forEach(game => loadPBP(game.GameID));
  } catch (err) {
    console.error(err);
    grid.innerHTML = `<div class=\"empty\"><div class=\"empty-icon\">!</div><p>資料讀取失敗，請稍後再試</p></div>`;
  }
}

async function loadPBP(gameId) {
  try {
    const logs = await (await fetch(`/api/playbyplay/${gameId}`)).json();
    const txt = logs.map(l => l.Description || l.description || '').filter(Boolean).join(' | ');
    document.getElementById(`pbp-${gameId}`).innerText = txt || '暫無即時動態';
  } catch(e) {
    document.getElementById(`pbp-${gameId}`).innerText = '暫無即時文字紀錄';
  }
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
